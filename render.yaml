services:
  - type: web
    name: getmorelocalai-gia-realtime-bridge
    env: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_REALTIME_MODEL
        value: gpt-4o-realtime-preview
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-4o-mini
      - key: GIA_VOICE
        value: alloy
      - key: GIA_MAX_CALL_SECONDS
        value: "420"
      - key: GIA_AUDIO_MODE
        value: half_duplex
      - key: GIA_ECHO_SUPPRESSION
        value: "true"
      - key: GIA_ECHO_RESUME_DELAY_MS
        value: "650"
      - key: GIA_ECHO_MARK_DEBOUNCE_MS
        value: "120"
      - key: GIA_ECHO_MAX_MUTE_MS
        value: "8000"
      - key: GIA_UNCLEAR_REPEAT_LIMIT
        value: "6"
      - key: GIA_UNCLEAR_FALLBACK_COOLDOWN_MS
        value: "60000"
      - key: GIA_UNCLEAR_FORCE_FALLBACK
        value: "false"
      - key: GIA_END_CALL_DELAY_MS
        value: "6000"
      - key: GIA_END_CALL_FALLBACK_DELAY_MS
        value: "12000"
      - key: LIVE_TRANSFER_NUMBER
        sync: false
      - key: LIVE_TRANSFER_TIMEOUT_SECONDS
        value: "20"
      - key: LIVE_TRANSFER_REQUEST_LIMIT
        value: "2"
      - key: SEND_SUMMARY_EMAIL
        value: "true"
      - key: SMTP_HOST
        value: gator4126.hostgator.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: agent@getmorelocalai.com
      - key: MAIL_FROM
        value: agent@getmorelocalai.com
      - key: MAIL_TO
        value: info@getmorelocalai.com
